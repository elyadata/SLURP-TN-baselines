# SLURP-TN end-to-end SLU Intent Recognition (IR) with a Whisper system.
#
# Authors
# -------
#  * Haroun Elleuch, 2026

# Seed needs to be set at top of yaml, before objects with parameters are made
seed: 1986
__set_seed: !apply:speechbrain.utils.seed_everything [!ref <seed>]

# Experiment
experiment_id: baseline
output_folder: !ref ./results/<experiment_id>

dev_scores_dir: !ref <output_folder>/dev_scores
test_scores_dir: !ref <output_folder>/test_scores

save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt
pretrained_models_folder: ../../pretrained_models

# Data
data_folder: ../../data
manifest_folder: !ref <data_folder>/manifests

train_csv: !ref <manifest_folder>/train.csv
dev_csv: !ref <manifest_folder>/validation.csv
test_csv: !ref <manifest_folder>/test.csv

target_column: intent
skip_prep: True

ckpt_interval_minutes: 10 # save checkpoint every N min

# The train logger writes training statistics to a file, as well as stdout.
train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>

metrics_log_dir: !ref <output_folder>/metrics/

error_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.classification_error
        reduction: batch
  
####################### Training Parameters ####################################
number_of_epochs: 100
train_batch_size: 8
eval_batch_size: 4

grad_accumulation_factor: 4

n_intents: 23 # 21 in train + 2 in dev and test unseen in train.
features_dim: 768
# tiny => 384
# base => 512
# small => 768
# medium => 1024
# large => 1280

whisper_hub: openai/whisper-small
# whisper_hub: ../../pretrained_models/whisper-small

# Learning rates
lr: 0.0001
lr_whisper: 0.00001

# Dataloaders
num_workers: 4
drop_last: True
train_dataloader_options:
    num_workers: !ref <num_workers>
    batch_size: !ref <train_batch_size>
    drop_last: !ref <drop_last>
    shuffle: True

test_dataloader_options:
    num_workers: !ref <num_workers>
    batch_size: !ref <eval_batch_size>
    shuffle: True


############################## Models ##########################################
#Whisper model
whisper: !new:speechbrain.lobes.models.huggingface_transformers.whisper.Whisper
    source: !ref <whisper_hub>
    encoder_only: True
    freeze_encoder: False
    save_path: !ref <pretrained_models_folder>/whisper_model

# Average pooling
avg_pool: !new:speechbrain.nnet.pooling.StatisticsPooling
    return_mean: True 
    return_std: False

output_mlp: !new:speechbrain.nnet.linear.Linear
    input_size: !ref <features_dim>
    n_neurons: !ref <n_intents>
    bias: False

# The first object passed to the Brain class is this "Epoch Counter"
# which is saved by the Checkpointer so that training can be resumed
# if it gets interrupted at any point.
epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
    limit: !ref <number_of_epochs>

# Objects in "modules" dict will have their parameters moved to the correct
# device, as well as having train()/eval() called on them by the Brain class.
modules:
    whisper: !ref <whisper>
    output_mlp: !ref <output_mlp>

model: !new:torch.nn.ModuleList
    - [!ref <output_mlp>]

log_softmax: !new:speechbrain.nnet.activations.Softmax
    apply_log: True

compute_cost: !name:speechbrain.nnet.losses.nll_loss

# This optimizer will be constructed by the Brain class after all parameters
# are moved to the correct device. Then it will be added to the checkpointer.
opt_class: !name:torch.optim.Adam
    lr: !ref <lr>
    weight_decay: 0.000002

whisper_opt_class: !name:torch.optim.Adam
    lr: !ref <lr_whisper>

lr_annealing: !new:speechbrain.nnet.schedulers.NewBobScheduler
    initial_value: !ref <lr>
    improvement_threshold: 0.0025
    annealing_factor: 0.9
    patient: 0

lr_annealing_whisper: !new:speechbrain.nnet.schedulers.NewBobScheduler
    initial_value: !ref <lr_whisper>
    improvement_threshold: 0.0025
    annealing_factor: 0.9

############################## Logging and Pretrainer ##########################

# This object is used for saving the state of training both so that it
# can be resumed if it gets interrupted, and also so that the best checkpoint
# can be later loaded for evaluation or inference.
checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <save_folder>
    recoverables:
        whisper: !ref <whisper>
        output_mlp: !ref <output_mlp>
        counter: !ref <epoch_counter>
