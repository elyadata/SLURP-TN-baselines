# SLURP-TN ASR with a Whisper system.
#
# Authors
# -------
#  * Haroun Elleuch, 2026


seed: 1986
__set_seed: !apply:speechbrain.utils.seed_everything [!ref <seed>]


# Experiment
experiment_id: whisper_base_asr
output_folder: !ref ./results/<experiment_id>

dev_scores_dir: !ref <output_folder>/dev_scores
test_scores_dir: !ref <output_folder>/test_scores

save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt
pretrained_models_folder: ../pretrained_models


# Data
data_folder: ../data
manifest_folder: !ref <data_folder>/manifests

train_csv: !ref <manifest_folder>/train.csv
valid_csv: !ref <manifest_folder>/validation.csv
test_csv: !ref <manifest_folder>/test.csv

target_column: tun_transcription
task: asr
skip_prep: True


# Model
whisper_hub: openai/whisper-base

normalized_transcripts: False

sample_rate: 16000
avoid_if_longer_than: 30.0

freeze_whisper: False
freeze_encoder: False

whisper: !new:speechbrain.integrations.huggingface.whisper.Whisper
  source: !ref <whisper_hub>
  freeze: !ref <freeze_whisper>
  freeze_encoder: !ref <freeze_encoder>
  save_path: !ref <pretrained_models_folder>/whisper_model
  task: transcribe


# Training
number_of_epochs: 15
batch_size: 4
test_batch_size: 1
grad_accumulation_factor: 4

lr_whisper: 1e-5
weight_decay: 0.01
max_grad_norm: 2.0
warmup_steps: 500

precision: fp16
eval_precision: fp16

sorting: ascending

train_loader_kwargs:
  batch_size: !ref <batch_size>
  shuffle: True
  num_workers: 0

valid_loader_kwargs:
  batch_size: !ref <batch_size>
  shuffle: False
  num_workers: 0

test_loader_kwargs:
  batch_size: !ref <test_batch_size>
  shuffle: False
  num_workers: 0


# Decoding
min_decode_ratio: 0.0
max_decode_ratio: 1.0
test_beam_size: 8

valid_search: !new:speechbrain.decoders.seq2seq.S2SWhisperGreedySearcher
  model: !ref <whisper>
  use_kv_cache: True
  suppress_blank: True
  suppress_tokens: []
  min_decode_ratio: !ref <min_decode_ratio>
  max_decode_ratio: !ref <max_decode_ratio>
  sample_len: 448

test_search: !new:speechbrain.decoders.seq2seq.S2SWhisperBeamSearcher
  module: [!ref <whisper>]
  min_decode_ratio: !ref <min_decode_ratio>
  max_decode_ratio: !ref <max_decode_ratio>
  beam_size: !ref <test_beam_size>
  sample_len: 448
  suppress_tokens: []


# Optimizer / scheduler
lr_annealing_whisper: !new:speechbrain.nnet.schedulers.NoamScheduler
  lr_initial: !ref <lr_whisper>
  n_warmup_steps: !ref <warmup_steps>

whisper_opt_class: !name:torch.optim.AdamW
  lr: !ref <lr_whisper>
  weight_decay: !ref <weight_decay>


# Loss
log_softmax: !new:speechbrain.nnet.activations.Softmax
  apply_log: True

nll_loss: !name:speechbrain.nnet.losses.nll_loss


# Epoching / checkpointing
epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounterWithStopper
  limit: !ref <number_of_epochs>
  limit_to_stop: 3
  limit_warmup: 1
  direction: min

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
  checkpoints_dir: !ref <save_folder>
  recoverables:
    whisper: !ref <whisper>
    scheduler_whisper: !ref <lr_annealing_whisper>
    counter: !ref <epoch_counter>


# Logging
train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
  save_file: !ref <train_log>


# Modules
modules:
  whisper: !ref <whisper>